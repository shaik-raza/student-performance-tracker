<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="background">
    <span class="circle c1"></span>
    <span class="circle c2"></span>
    <span class="circle c3"></span>
</div>

<div class="container">
    <div class="card">

        <div class="icon-wrap">
            <span class="icon">🎓</span>
        </div>

        <h1>Student <span class="highlight">Performance</span> Tracker</h1>

        <p class="stars">★ ★ ★</p>

        <p class="subtitle">Enter your Roll Number to view your semester performance.</p>

        <form action="/result" method="POST">

            <div class="input-wrap">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                     fill="none" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.6"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" stroke-width="1.6"
                          stroke-linecap="round"/>
                </svg>
              <input type="text" name="roll_no" placeholder="Enter Roll Number" required>
            </div>

            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24">
                    <path d="M3 12h18M13 6l6 6-6 6" stroke="white" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                View Result &nbsp;→
            </button>

        </form>

        <div class="badges">
            <div class="badge">
                <div class="badge-icon" style="background:rgba(99,102,241,0.3);">🛡️</div>
                <span class="badge-label">Secure</span>
                <span class="badge-desc">Your data is safe</span>
            </div>
            <div class="badge">
                <div class="badge-icon" style="background:rgba(59,130,246,0.3);">⚡</div>
                <span class="badge-label">Fast</span>
                <span class="badge-desc">Instant results</span>
            </div>
            <div class="badge">
                <div class="badge-icon" style="background:rgba(16,185,129,0.3);">✅</div>
                <span class="badge-label">Accurate</span>
                <span class="badge-desc">100% reliable</span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
